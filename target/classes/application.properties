server.port=8080
server.servlet.context-path=/api

# Database
spring.datasource.url=jdbc:mysql://localhost:3306/linkedin_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true

spring.datasource.username=root
spring.datasource.password=adminroot

spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

# JWT
jwt.secret=linkedin-capstone-super-secret-key-must-be-256-bits-long-for-hs256
jwt.expiration=86400000

# File Upload
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
file.upload-dir=./uploads

# Logging
logging.level.com.linkedin=DEBUG
logging.level.org.springframework.security=INFO

# Swagger
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method

# ── Resilience4j Circuit Breaker (US02: Login) ──────────────────────────────
# Opens after 3 failures within a 30s sliding window; stays open 60s
resilience4j.circuitbreaker.instances.loginService.slidingWindowType=COUNT_BASED
resilience4j.circuitbreaker.instances.loginService.slidingWindowSize=3
resilience4j.circuitbreaker.instances.loginService.failureRateThreshold=100
resilience4j.circuitbreaker.instances.loginService.waitDurationInOpenState=60s
resilience4j.circuitbreaker.instances.loginService.permittedNumberOfCallsInHalfOpenState=1
resilience4j.circuitbreaker.instances.loginService.automaticTransitionFromOpenToHalfOpenEnabled=true
resilience4j.circuitbreaker.instances.loginService.registerHealthIndicator=true
